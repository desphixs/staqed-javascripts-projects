<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash | Rock Paper Scissors</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* * Custom Shake Animations
         * We rotate the hands 90 degrees so they face each other, 
         * and the computer hand is flipped (scaleX) to look like a right hand.
         */
        @keyframes shakePlayer {

            0%,
            100% {
                transform: translateY(0) rotate(90deg);
            }

            50% {
                transform: translateY(-30px) rotate(90deg);
            }
        }

        @keyframes shakeComputer {

            0%,
            100% {
                transform: translateY(0) rotate(90deg) scaleX(-1);
            }

            50% {
                transform: translateY(-30px) rotate(90deg) scaleX(-1);
            }
        }

        .animate-shake-player {
            animation: shakePlayer 0.4s ease-in-out infinite;
        }

        .animate-shake-computer {
            animation: shakeComputer 0.4s ease-in-out infinite;
        }

        /* Helper classes for static positioning */
        .player-hand-static {
            transform: rotate(90deg);
        }

        .computer-hand-static {
            transform: rotate(90deg) scaleX(-1);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-slate-800">

    <main class="w-full max-w-lg bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">

        <header class="bg-slate-900 text-white p-8 flex justify-between items-center rounded-b-3xl shadow-md z-10">
            <div class="text-center">
                <h2 class="text-xs uppercase tracking-widest text-slate-400 mb-1 font-semibold">Player</h2>
                <p id="player-score" class="text-4xl font-bold">0</p>
            </div>

            <div class="text-center text-slate-500 font-medium">VS</div>

            <div class="text-center">
                <h2 class="text-xs uppercase tracking-widest text-slate-400 mb-1 font-semibold">Computer</h2>
                <p id="computer-score" class="text-4xl font-bold">0</p>
            </div>
        </header>

        <section class="flex-1 py-16 px-8 flex justify-between items-center bg-slate-50 relative">
            <i id="player-hand" class="fa-solid fa-hand-back-fist text-7xl text-blue-500 player-hand-static transition-colors"></i>

            <i id="computer-hand" class="fa-solid fa-hand-back-fist text-7xl text-rose-500 computer-hand-static transition-colors"></i>
        </section>

        <section class="text-center pb-6 bg-slate-50">
            <h3 id="status-text" class="text-xl font-semibold text-slate-700">Choose your weapon</h3>
        </section>

        <nav class="p-8 bg-white border-t border-slate-100 flex flex-col gap-6">
            <div class="flex justify-center gap-4">
                <button class="choice-btn bg-slate-100 hover:bg-slate-200 text-slate-700 w-16 h-16 rounded-2xl text-2xl transition-all hover:-translate-y-1 shadow-sm" data-choice="rock" title="Rock">
                    <i class="fa-solid fa-hand-back-fist"></i>
                </button>
                <button class="choice-btn bg-slate-100 hover:bg-slate-200 text-slate-700 w-16 h-16 rounded-2xl text-2xl transition-all hover:-translate-y-1 shadow-sm" data-choice="paper" title="Paper">
                    <i class="fa-solid fa-hand"></i>
                </button>
                <button class="choice-btn bg-slate-100 hover:bg-slate-200 text-slate-700 w-16 h-16 rounded-2xl text-2xl transition-all hover:-translate-y-1 shadow-sm" data-choice="scissors" title="Scissors">
                    <i class="fa-solid fa-hand-scissors"></i>
                </button>
            </div>

            <button id="reset-btn" class="w-full text-slate-400 hover:text-slate-600 font-medium py-2 transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Reset Game
            </button>
        </nav>

    </main>

    <script src="script.js"></script>
</body>

</html>
