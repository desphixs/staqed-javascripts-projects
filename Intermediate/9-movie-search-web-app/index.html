<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel | Movie Search</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Smooth fade-in for the modal and cards */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal backdrop blur */
        .modal-backdrop {
            backdrop-filter: blur(4px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col items-center p-4 md:p-8">

    <main class="w-full max-w-6xl">

        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h1 class="text-3xl font-bold flex items-center gap-3 text-slate-900">
                <i class="fa-solid fa-film text-indigo-500"></i> Reel.
            </h1>

            <div class="relative w-full md:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search for movies..."
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-12 pr-4 outline-none focus:border-indigo-400 focus:bg-white transition-colors">
            </div>
        </header>

        <nav class="flex gap-4 mb-8">
            <button id="tab-search" class="active-tab bg-indigo-600 text-white px-6 py-2 rounded-xl font-medium shadow-sm transition-colors">
                Search Results
            </button>
            <button id="tab-watchlist" class="bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 px-6 py-2 rounded-xl font-medium transition-colors">
                My Watchlist
            </button>
        </nav>

        <section id="movies-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p id="status-message" class="col-span-full text-center text-slate-500 py-12">
                Start typing to discover movies...
            </p>
        </section>

    </main>

    <section id="movie-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop bg-slate-900/40">

        <article class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row relative">

            <button id="close-modal-btn" class="absolute top-4 right-4 w-10 h-10 bg-white/80 hover:bg-slate-100 text-slate-800 rounded-full flex items-center justify-center transition-colors z-10 shadow-sm backdrop-blur-sm">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>

            <figure class="w-full md:w-1/2 h-64 md:h-auto bg-slate-100 shrink-0">
                <img id="modal-poster" src="" alt="Movie Poster" class="w-full h-full object-cover">
            </figure>

            <div class="p-8 flex flex-col justify-between w-full">
                <div>
                    <h2 id="modal-title" class="text-2xl font-bold text-slate-900 mb-2 leading-tight">Movie Title</h2>

                    <div class="flex items-center gap-3 text-sm text-slate-500 font-medium mb-4">
                        <span id="modal-year" class="bg-slate-100 px-2 py-1 rounded-md">2023</span>
                        <span id="modal-rating" class="flex items-center gap-1">
                            <i class="fa-solid fa-star text-yellow-400"></i> 8.5
                        </span>
                        <span id="modal-runtime">120 min</span>
                    </div>

                    <p id="modal-plot" class="text-slate-600 text-sm leading-relaxed mb-6">Plot summary goes here...</p>
                </div>

                <button id="watchlist-btn" class="w-full bg-indigo-50 border-2 border-indigo-100 hover:border-indigo-500 text-indigo-700 font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-bookmark"></i> Add to Watchlist
                </button>
            </div>
        </article>

    </section>

    <script src="script.js"></script>
</body>

</html>
