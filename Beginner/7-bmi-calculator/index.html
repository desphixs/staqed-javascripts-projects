<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCheck // Simple BMI Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">

        <header class="bg-indigo-600 p-8 text-white">
            <div class="flex items-center gap-3 mb-2">
                <i class="fas fa-heartbeat text-2xl"></i>
                <h1 class="text-xl font-bold tracking-tight">HealthCheck</h1>
            </div>
            <p class="text-indigo-100 text-sm">Calculate your Body Mass Index instantly.</p>
        </header>

        <section class="p-8">
            <form id="bmi-form" class="space-y-6">
                <div class="flex flex-col gap-2">
                    <label for="height" class="text-sm font-semibold text-slate-700">Height (cm)</label>
                    <div class="relative">
                        <i class="fas fa-ruler-vertical absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input
                            type="number"
                            id="height"
                            placeholder="e.g. 180"
                            class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all"
                            required>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="weight" class="text-sm font-semibold text-slate-700">Weight (kg)</label>
                    <div class="relative">
                        <i class="fas fa-weight-hanging absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input
                            type="number"
                            id="weight"
                            placeholder="e.g. 75"
                            class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all"
                            required>
                    </div>
                </div>

                <button
                    type="submit"
                    id="calculate-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98]">
                    Calculate BMI
                </button>
            </form>

            <div id="result-container" class="hidden mt-8 pt-8 border-t border-slate-100 text-center animate-in fade-in zoom-in duration-300">
                <p class="text-slate-500 text-sm uppercase tracking-widest font-bold mb-1">Your Result</p>
                <div id="bmi-value" class="text-5xl font-black text-slate-800 mb-2">24.5</div>
                <div id="bmi-status" class="inline-block px-4 py-1 rounded-full text-sm font-bold bg-green-100 text-green-700">
                    Normal Weight
                </div>
            </div>
        </section>

        <footer class="bg-slate-50 p-6 text-center">
            <p class="text-xs text-slate-400 leading-relaxed">
                BMI is a convenient rule of thumb used to broadly categorize a person as underweight, normal weight, overweight, or obese.
            </p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
