<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tip Calculator</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-xl w-full max-w-sm border border-blue-100">

        <h1 class="text-2xl font-extrabold text-gray-800 text-center mb-2">
            Tip Calculator
        </h1>
        <p class="text-gray-500 text-center text-sm mb-8">Quickly calculate a standard 20% tip.</p>

        <div class="mb-6">
            <label for="bill-input" class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">
                Bill Amount ($)
            </label>
            <input
                type="number"
                id="bill-input"
                placeholder="e.g. 45.00"
                class="w-full text-2xl font-bold text-gray-800 bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:bg-white transition-colors">
        </div>

        <button id="calculate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-4 rounded-xl shadow-md hover:shadow-lg transition-all transform hover:-translate-y-1 mb-8">
            Calculate 20% Tip
        </button>

        <div class="bg-blue-50 rounded-2xl p-6 text-center border border-blue-100">
            <p class="text-sm font-bold text-blue-600 uppercase tracking-widest mb-1">Tip Amount</p>

            <p class="text-4xl font-black text-blue-900">
                $<span id="tip-amount">0.00</span>
            </p>
        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
